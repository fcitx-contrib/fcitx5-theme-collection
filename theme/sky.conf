[LightMode]
# 覆盖默认值
OverrideDefault=True
# 高亮颜色
HighlightColor=#e6edff
# 悬停时高亮颜色
HighlightHoverColor=#e6edff
# 高亮文本颜色
HighlightTextColor=#326fe6
# 按下时高亮文本颜色
HighlightTextPressColor=#326fe6
# 高亮标签颜色
HighlightLabelColor=#326fe6
# 高亮注释颜色
HighlightCommentColor=#326fe6
# 高亮标记颜色
HighlightMarkColor=#326fe6
# 面板颜色
PanelColor=#ffffff
# 文本颜色
TextColor=#000000
# 标签颜色
LabelColor=#000000
# 注释颜色
CommentColor=#000000
# 翻页按钮颜色
PagingButtonColor=#000000
# 禁用的翻页按钮颜色
DisabledPagingButtonColor=#999a9c
# 指示文本颜色
AuxColor=#000000
# 光标前的预编辑颜色
PreeditColorPreCaret=#326fe6
# 预编辑光标颜色
PreeditColorCaret=#326fe6
# 光标后的预编辑颜色
PreeditColorPostCaret=#000000
# 边框颜色
BorderColor=#d2d2d2
# 分隔线颜色
DividerColor=#999a9c

[DarkMode]
# 覆盖默认值
OverrideDefault=True
# 与浅色模式相同
SameWithLightMode=False
# 高亮颜色
HighlightColor=#326fe6
# 悬停时高亮颜色
HighlightHoverColor=#326fe6
# 高亮文本颜色
HighlightTextColor=#ffffff
# 按下时高亮文本颜色
HighlightTextPressColor=#ffffff
# 高亮标签颜色
HighlightLabelColor=#ffffff
# 高亮注释颜色
HighlightCommentColor=#ffffff
# 高亮标记颜色
HighlightMarkColor=#ffffff
# 面板颜色
PanelColor=#48484e
# 文本颜色
TextColor=#ffffff
# 标签颜色
LabelColor=#ffffff
# 注释颜色
CommentColor=#ffffff
# 翻页按钮颜色
PagingButtonColor=#ffffffd1
# 禁用的翻页按钮颜色
DisabledPagingButtonColor=#818185
# 指示文本颜色
AuxColor=#ffffff
# 光标前的预编辑颜色
PreeditColorPreCaret=#326fe6
# 预编辑光标颜色
PreeditColorCaret=#326fe6
# 光标后的预编辑颜色
PreeditColorPostCaret=#ffffff
# 边框颜色
BorderColor=#000000
# 分隔线颜色
DividerColor=#818185

[Typography]
# 布局
Layout=Horizontal
# 书写模式
WritingMode="Horizontal top-bottom"
# 垂直时注释右对齐
VerticalCommentsAlignRight=False
# 翻页按钮样式
PagingButtonsStyle=Arrow

[Background]
# 图片
ImageUrl=
# 有图片时保留面板颜色
KeepPanelColorWhenHasImage=False
# 模糊
Blur=System
# 阴影
Shadow=True

[Font]
# 文本字号
TextFontSize=16
# 文本字重
TextFontWeight=400
# 标签字号
LabelFontSize=12
# 标签字重
LabelFontWeight=400
# 注释字号
CommentFontSize=12
# 注释字重
CommentFontWeight=400
# 预编辑字号
PreeditFontSize=16
# 预编辑字重
PreeditFontWeight=400

[Caret]
# 样式
Style=Blink
# 文本
Text=‸

[Highlight]
# 标记样式
MarkStyle=None
# 标记文本
MarkText=🐧
# 悬停行为
HoverBehavior=Move

[Size]
# 覆盖默认值
OverrideDefault=True
# 边框宽度（px）
BorderWidth=1
# 边框半径（px）
BorderRadius=6
# 外边距（px）
Margin=0
# 高亮半径（px）
HighlightRadius=0
# 顶填充（px）
TopPadding=2
# 右填充（px）
RightPadding=10
# 底填充（px）
BottomPadding=2
# 左填充（px）
LeftPadding=10
# 标签、文本、注释间隔（px）
LabelTextGap=6
# 垂直时最小宽度（px）
VerticalMinWidth=200
# 卷轴单元格宽度 (px)
ScrollCellWidth=65
# 水平分隔线宽度（px）
HorizontalDividerWidth=0
